name: "III. Behavioral Patterns"
description: Discuss patterns like Observer, Strategy, Command, or State Machine.
title: "[Behavioral Pattern Name]: Your Title Here"
body:
  - type: markdown
    attributes:
      value: "Use this template to discuss object interaction and responsibility assignment."
  - type: textarea
    id: pattern-name
    attributes:
      label: Pattern Name
      placeholder: e.g., 24_Observer, 26_Strategy...
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Discussion Topic
      placeholder: Share your questions or implementation ideas here...
    validations:
      required: true
