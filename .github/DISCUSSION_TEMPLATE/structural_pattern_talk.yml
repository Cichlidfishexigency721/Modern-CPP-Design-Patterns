name: II. Structural Patterns
description: Discuss patterns like Adapter, Bridge, Composite, or Decorator.
title: "[Structural Pattern Name]: Your Title Here"
body:
  - type: markdown
    attributes:
      value: "Use this template to talk about patterns related to organizing classes and objects."
  - type: textarea
    id: pattern-name
    attributes:
      label: Pattern Name
      placeholder: e.g., 08_Adapter, 11_Decorator...
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Discussion Topic
      placeholder: What would you like to discuss about this pattern's implementation?
    validations:
      required: true
